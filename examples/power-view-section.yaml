# Drop-in "Solar Generation" block for the Power view.
#
# A vertical-stack is used rather than a sections grid: in a sections view the
# card is handed a narrow column and the panels collapse to slivers, and the
# heading lands beside the card instead of above it. The stack gives the card
# the full width without any grid_options fiddling.
type: vertical-stack
cards:
  - type: heading
    heading: Solar Generation
  - type: custom:solar-bank-card
    max_value: 300
    banks:
      - name: West
        entities:
          - sensor.inverter_122016007611_west
          - sensor.inverter_122016007612_west
          - sensor.inverter_122016007609_west
          - sensor.inverter_122016009980_west
          - sensor.inverter_122016009650_west
          - sensor.inverter_122016010683_west
          - sensor.inverter_122016010704_west
          - sensor.inverter_122016012044_west
          - sensor.inverter_122016012087_west
      - name: East
        entities:
          - sensor.inverter_122016006491_east
          - sensor.inverter_122016007555_east
          - sensor.inverter_122016010613_east
          - sensor.inverter_122016010678_east
          - sensor.inverter_122016010681_east
          - sensor.inverter_122016011089_east
          - sensor.inverter_122016012045_east
          - sensor.inverter_122016012047_east
          - sensor.inverter_122016012072_east
